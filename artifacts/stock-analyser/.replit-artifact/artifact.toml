kind = "web"
previewPath = "/"
title = "Stock Analyser"
version = "1.0.0"
id = "artifacts/stock-analyser"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24781

[services.development]
run = "pnpm --filter @workspace/stock-analyser run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/stock-analyser", "run", "build" ]
publicDir = "artifacts/stock-analyser/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24781"
BASE_PATH = "/"
